<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Cook Planner</title>
    <meta name="theme-color" content="#c15a2b" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="panel" style="max-width: 680px; margin: 12vh auto 0; text-align: center;">
        <article class="card">
          <p class="eyebrow">Offline mode</p>
          <h1 style="max-width: none; margin-bottom: 18px;">No internet connection</h1>
          <p class="section-note" style="margin-bottom: 24px;">
            Cook Planner can still open from cache, but live updates and sign-in require connection.
          </p>
          <button class="primary-btn" type="button" onclick="window.location.reload()">Try again</button>
        </article>
      </section>
    </main>
  </body>
</html>
