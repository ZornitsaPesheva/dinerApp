<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cook Planner</title>
    <meta property="og:title" content="Cook Planner" />
    <meta property="og:description" content="Keep a list of recipes, track how often each has been cooked, and get suggestions for what to cook today." />
    <meta property="og:image" content="/dinners.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Cooking Plan</p>
        <h1>What should we cook today?</h1>
        <div id="mobile-auth-slot" class="mobile-auth-slot" hidden></div>
        <!-- <p class="hero-copy">
          The app keeps a list of recipes, tracks how many times each has been cooked and when,
          then suggests the one cooked longest ago and the one cooked least often.
        </p> -->
      </section>

      <section class="panel auth-panel">
        <article class="card auth-card">
          <div class="card-header auth-header">
            <div id="auth-intro">
              <h2>Google Sign-in</h2>
              <p class="auth-copy">Sign in with Google to create your personal list of favorite recipes.</p>
            </div>
          </div>

          <div id="auth-user" class="auth-user" hidden>
            <img id="user-avatar" class="user-avatar" alt="" />
            <div>
              <p id="user-name" class="auth-user-name"></p>
              <p id="user-email" class="auth-user-email"></p>
            </div>
            <button id="logout-button" class="ghost-btn" type="button" hidden>Log out</button>
          </div>

          <div id="google-signin" class="google-signin"></div>
          <p id="auth-message" class="message" aria-live="polite"></p>
        </article>
      </section>

      <div id="app-shell" hidden>
        <section class="panel panel-grid">
          <article class="card add-card">
            <h2>Add a New Recipe</h2>
            <form id="dish-form" class="stack">
              <label class="field">
                <span>Name</span>
                <input id="dish-name" name="name" type="text" maxlength="80" required />
              </label>
              <label class="field">
                <span>Description</span>
                <textarea id="dish-notes" name="notes" rows="3" maxlength="200"></textarea>
              </label>
              <button type="submit" class="primary-btn">Save</button>
            </form>
            <p id="form-message" class="message" aria-live="polite"></p>
          </article>

          <article class="card suggestions-card">
            <div class="card-header">
              <h2>Cooking Suggestions</h2>
              <button id="refresh-button" class="ghost-btn" type="button">Refresh</button>
            </div>
            <div id="suggestions" class="suggestions-list"></div>
          </article>
        </section>

        <section class="panel">
          <div class="card-header">
            <h2>All Recipes</h2>
            <p class="section-note">Click "Cooked it" to mark the recipe as cooked.</p>
          </div>
          <div id="dishes" class="dish-list"></div>
        </section>
      </div>
    </main>

    <template id="suggestion-template">
      <article class="suggestion-item">
        <div class="dish-main">
          <div>
            <p class="suggestion-label"></p>
            <h3 class="suggestion-name"></h3>
            <p class="suggestion-meta"></p>
          </div>
          <button class="primary-btn cook-button" type="button">Cooked it</button>
        </div>
      </article>
    </template>

    <template id="dish-template">
      <article class="dish-item">
        <div class="dish-main">
          <div>
            <h3 class="dish-name"></h3>
            <p class="dish-notes"></p>
          </div>
          <button class="primary-btn cook-button" type="button">Cooked it</button>
        </div>
        <div class="dish-meta-row">
          <span class="meta-pill count-pill"></span>
          <span class="meta-pill last-pill"></span>
        </div>
      </article>
    </template>

    <footer class="site-footer">Created by pesheva@gmail.com</footer>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="/app.js"></script>
  </body>
  </html>
